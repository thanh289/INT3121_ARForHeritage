<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <title>Artifact AR</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>
</head>

<body>
    <section class="section ar-page-section">
        <div class="container is-max-desktop">
            <a id="back-to-detail" href="index.html" class="button is-ghost mb-4 pl-0"
                style="color: var(--accent-red);">
                <span class="icon">←</span> <span>Back to Details</span>
            </a>

            <div class="columns is-variable is-8 is-vcentered">
                <div class="column is-7">
                    <div class="artifact-card ar-landing-viewer-card">
                        <model-viewer id="ar-model-viewer" class="ar-landing-viewer" camera-controls auto-rotate
                            shadow-intensity="1" background-color="#fafafa" ar ar-modes="webxr scene-viewer quick-look"
                            ar-scale="auto" ar-placement="floor" xr-environment touch-action="pan-y">
                            <button slot="ar-button" class="button is-small ar-slot-button">
                                <span class="icon"><i class="fas fa-cube"></i></span>
                                <span>View in AR</span>
                            </button>
                        </model-viewer>
                    </div>
                </div>

                <div class="column is-5">
                    <h1 class="title is-2 mb-2" id="ar-detail-name">Loading...</h1>
                    <p class="subtitle is-5 mb-2 detail-category" id="ar-detail-category">Category</p>
                    <div class="detail-divider"></div>

                    <div class="content is-size-6">
                        <p id="ar-detail-desc">Description details will appear here.</p>
                        <p><b>Significance:</b> <span id="ar-detail-significance"></span></p>
                    </div>

                    <div class="buttons mt-4">
                        <button id="btn-start-ar-voice" class="button ar-button-main">
                            <span class="icon"><i class="fas fa-cube"></i></span>
                            <span>Start AR + Voice</span>
                        </button>
                        <button id="btn-read-ar-info" class="button ar-button-secondary">
                            <span class="icon"><i class="fas fa-volume-up"></i></span>
                            <span>Read Info</span>
                        </button>
                        <button id="btn-stop-ar-voice" class="button ar-button-secondary">
                            <span class="icon"><i class="fas fa-stop"></i></span>
                            <span>Stop</span>
                        </button>
                    </div>

                    <p id="ar-support-note" class="is-size-7 mt-3 ar-support-note">
                        If AR does not open, your browser/device may not support WebXR, Scene Viewer, or Quick Look.
                    </p>
                </div>
            </div>
        </div>
    </section>

    <script type="module" src="js/ar.js"></script>
</body>

</html>
