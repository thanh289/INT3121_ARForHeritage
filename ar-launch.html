<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>AR Launch</title>
    <style>
        :root {
            --bg-color: #fdfbf7;
            --text-color: #2c241b;
            --accent-red: #8a1c1c;
            --accent-gold: #c5a059;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Lora', serif;
            background-image: radial-gradient(#e0dcd3 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .card {
            background: #fff;
            border: 1px solid #e0e0e0;
            box-shadow: 6px 6px 0px rgba(197, 160, 89, 0.25);
            max-width: 420px;
            width: 100%;
            padding: 2.5rem 2rem 2rem;
            text-align: center;
            border-top: 4px solid var(--accent-red);
        }

        .logo-line {
            font-family: 'Playfair Display', serif;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-bottom: 1.5rem;
        }

        .artifact-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent-red);
            line-height: 1.25;
            margin-bottom: 0.4rem;
            white-space: pre-line;
        }

        .artifact-category {
            font-style: italic;
            color: var(--accent-gold);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .divider {
            width: 50px;
            height: 2px;
            background: var(--accent-red);
            margin: 0 auto 1.5rem;
        }

        .status-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            background: #fdf6ec;
            border: 1px solid rgba(197, 160, 89, 0.4);
            border-radius: 6px;
            padding: 0.9rem 1.2rem;
            font-size: 0.9rem;
            color: var(--text-color);
            margin-bottom: 1.5rem;
            min-height: 56px;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(138, 28, 28, 0.2);
            border-top-color: var(--accent-red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-ar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background-color: var(--accent-red);
            color: #fff;
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            border: none;
            padding: 0.85rem 2rem;
            cursor: pointer;
            width: 100%;
            letter-spacing: 0.5px;
            transition: background 0.2s;
            box-shadow: 0 4px 12px rgba(138, 28, 28, 0.3);
            text-decoration: none;
        }

        .btn-ar:hover {
            background-color: #601313;
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: transparent;
            color: var(--accent-red);
            font-family: 'Lora', serif;
            font-size: 0.85rem;
            border: 1px solid var(--accent-gold);
            padding: 0.65rem 1.5rem;
            cursor: pointer;
            width: 100%;
            margin-top: 0.75rem;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: var(--accent-red);
            border-color: var(--accent-red);
            color: #fff;
        }

        .hint {
            font-size: 0.75rem;
            color: #999;
            margin-top: 1.25rem;
            font-style: italic;
            line-height: 1.5;
        }

        .hidden {
            display: none !important;
        }

        .os-badge {
            display: inline-block;
            font-size: 0.65rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: rgba(197, 160, 89, 0.15);
            color: var(--accent-gold);
            border: 1px solid rgba(197, 160, 89, 0.4);
            padding: 2px 8px;
            border-radius: 20px;
            margin-bottom: 1rem;
        }

        #ios-ar-anchor {
            display: none;
        }
    </style>
</head>

<body>
    <div class="card">
        <p class="logo-line">AR Tourism · Digital Museum</p>
        <h1 class="artifact-name" id="ar-name">Loading…</h1>
        <p class="artifact-category" id="ar-category"></p>
        <div class="divider"></div>

        <div class="status-box" id="status-box">
            <div class="spinner"></div>
            <span id="status-text">Detecting your device…</span>
        </div>

        <!-- Hidden helpers -->
        <a id="android-intent-link" class="hidden"></a>
        <a id="ios-ar-anchor" rel="ar" href="#"><img src="" alt="" style="display:none"></a>

        <!-- Single action section, shown after detection -->
        <div id="action-section" class="hidden">
            <span id="os-badge-el" class="os-badge"></span>
            <a id="btn-launch-ar" class="btn-ar">
                <i class="fas fa-cube"></i>
                <span id="btn-ar-label">View in AR</span>
            </a>
            <a id="btn-detail-page" class="btn-secondary">
                <i class="fas fa-arrow-left"></i> View Full Details
            </a>
            <p class="hint" id="ar-hint"></p>
        </div>
    </div>

    <script type="module">
        import { artifacts } from './js/data.js';

        const BASE = 'https://ar-for-heritage.vercel.app';

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const item = artifacts.find(a => a.id === id);

        const nameEl = document.getElementById('ar-name');
        const categoryEl = document.getElementById('ar-category');
        const statusBox = document.getElementById('status-box');
        const actionSec = document.getElementById('action-section');
        const osBadgeEl = document.getElementById('os-badge-el');
        const btnLaunch = document.getElementById('btn-launch-ar');
        const btnLabel = document.getElementById('btn-ar-label');
        const btnDetail = document.getElementById('btn-detail-page');
        const arHint = document.getElementById('ar-hint');

        function detailUrl(itemId) {
            return `${BASE}/detail.html?id=${encodeURIComponent(itemId)}`;
        }

        function setStatus(icon, text) {
            statusBox.innerHTML = `<span style="font-size:1.1rem;flex-shrink:0">${icon}</span><span>${text}</span>`;
        }

        function showActions() {
            statusBox.classList.add('hidden');
            actionSec.classList.remove('hidden');
        }

        if (!item) {
            nameEl.textContent = 'Artifact Not Found';
            setStatus('⚠️', 'Invalid QR code or artifact ID.');
            osBadgeEl.textContent = 'Error';
            btnLabel.textContent = 'Go to Gallery';
            btnLaunch.href = `${BASE}/index.html`;
            btnDetail.classList.add('hidden');
            showActions();
        } else {
            nameEl.textContent = item.name;
            categoryEl.textContent = item.category;
            btnDetail.href = detailUrl(item.id);

            const glbUrl = `${BASE}/${item.glb}`;
            const usdzUrl = item.usdz ? `${BASE}/${item.usdz}` : null;

            const ua = navigator.userAgent || '';
            const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
            const isAndroid = /Android/.test(ua);

            if (isAndroid) {
                // ── Android: Scene Viewer ────────────────────────────────
                const intentUrl =
                    `intent://arvr.google.com/scene-viewer/1.0` +
                    `?file=${encodeURIComponent(glbUrl)}` +
                    `&mode=ar_preferred` +
                    `&title=${encodeURIComponent(item.name.replace(/\n/g, ' '))}` +
                    `#Intent;scheme=https;` +
                    `package=com.google.android.googlequicksearchbox;` +
                    `action=android.intent.action.VIEW;` +
                    `S.browser_fallback_url=${encodeURIComponent(detailUrl(item.id))};` +
                    `end;`;

                document.getElementById('android-intent-link').href = intentUrl;
                btnLaunch.href = intentUrl;
                osBadgeEl.textContent = 'Android · Scene Viewer';
                btnLabel.textContent = 'Open in AR';
                arHint.textContent = 'Opens Google Scene Viewer. Requires Google Play Services for AR.';

                setStatus('🚀', 'Launching AR…');
                setTimeout(() => {
                    document.getElementById('android-intent-link').click();
                    // Show manual button after delay in case intent didn't fire
                    setTimeout(showActions, 2500);
                }, 600);

            } else if (isIOS && usdzUrl) {
                // ── iOS with USDZ: AR Quick Look ─────────────────────────
                const iosAnchor = document.getElementById('ios-ar-anchor');
                iosAnchor.href = usdzUrl;
                btnLaunch.href = usdzUrl;
                btnLaunch.setAttribute('rel', 'ar');
                osBadgeEl.textContent = 'iOS · AR Quick Look';
                btnLabel.textContent = 'Open in AR';
                arHint.textContent = 'Opens AR Quick Look. Point your camera at a flat surface.';

                setStatus('🚀', 'Opening AR Quick Look…');
                setTimeout(() => {
                    iosAnchor.click();
                    setTimeout(showActions, 2000);
                }, 600);

            } else if (isIOS && !usdzUrl) {
                // ── iOS without USDZ: redirect to detail page ────────────
                setStatus('📱', 'Redirecting to AR viewer…');
                setTimeout(() => {
                    window.location.href = detailUrl(item.id) + '&autoar=1';
                }, 1200);

            } else {
                // ── Desktop ──────────────────────────────────────────────
                osBadgeEl.textContent = 'Desktop';
                btnLabel.textContent = 'View 3D Model';
                btnLaunch.href = detailUrl(item.id);
                arHint.textContent = 'For the best AR experience, scan this QR code with your Android or iOS phone.';
                setStatus('🖥️', 'AR works on mobile. Scan the QR with your phone.');
                showActions();
            }
        }
    </script>
</body>

</html>
